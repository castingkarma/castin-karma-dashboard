<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SquawkTrail — user portals (interactive)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0E13;--surf:#0F1720;--surf2:#111C27;--line:#1D2732;--aqua:#25D0C8;--amber:#F5B301;--green:#3FCf8E;--red:#F0563A;--sky:#7FB0FF;--mut:#8A97A6;--tx:#EAF1F7}
*{box-sizing:border-box;margin:0}body{font-family:'Inter',sans-serif;background:var(--ink);color:var(--tx);-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono'}.tl{font-family:'JetBrains Mono';font-weight:700}
a{cursor:pointer}
.top{position:sticky;top:0;z-index:20;background:rgba(10,14,19,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top .in{max-width:1240px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:9px;font-family:'Space Grotesk';font-weight:700;font-size:18px;cursor:pointer}.brand b{color:var(--aqua)}
.mk{width:26px;height:26px}
.roletabs{display:inline-flex;background:#0C1620;border:1px solid var(--line);border-radius:10px;padding:3px;margin-left:6px}
.roletabs button{border:none;background:none;cursor:pointer;font:inherit;font-size:13px;font-weight:700;color:var(--mut);padding:7px 15px;border-radius:8px}
.roletabs button.on{background:var(--aqua);color:#04211E}
.search{flex:1;max-width:300px;margin-left:auto;background:var(--surf);border:1px solid var(--line);border-radius:9px;padding:8px 12px;display:flex;gap:8px;align-items:center;color:var(--mut);font-size:13px;cursor:pointer}
.btn{font-weight:600;font-size:13px;border-radius:9px;padding:9px 14px;border:none;cursor:pointer;font-family:'Inter'}
.btn.p{background:var(--aqua);color:#04211E}.btn.g{background:var(--surf);border:1px solid var(--line);color:var(--tx)}.btn.a{background:var(--amber);color:#3a2a00}
.btn.sm{padding:6px 11px;font-size:12px}
.bell{position:relative;cursor:pointer;color:var(--mut);font-size:19px}.bell .dot{position:absolute;top:-2px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--amber)}
.av{width:32px;height:32px;border-radius:50%;background:#123;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--aqua);border:1px solid var(--line);cursor:pointer}
.shell{max-width:1240px;margin:0 auto;padding:20px 22px 70px;display:grid;grid-template-columns:212px 1fr;gap:22px}
.rail{border-right:1px solid var(--line);padding-right:16px}
.plan{font-family:'JetBrains Mono';font-size:11px;color:var(--aqua);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:14px;background:#0C1620}
.rail a{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;color:var(--mut);font-size:13.5px;font-weight:500;margin-bottom:2px;cursor:pointer}
.rail a.on,.rail a:hover{background:#13202B;color:var(--tx)}
.rail a .ic{width:16px;text-align:center;opacity:.9}
.rail .grp{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:#4E6070;margin:14px 0 6px 4px}
.main{min-width:0}
.h1{font-family:'Space Grotesk';font-size:23px;font-weight:700;letter-spacing:-.4px}
.crumb{font-size:12.5px;color:var(--mut);margin-top:2px}
.back{font-size:12.5px;color:var(--aqua);cursor:pointer;display:inline-flex;gap:6px;align-items:center;margin-bottom:12px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
.kpi{background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.kpi .n{font-family:'JetBrains Mono';font-size:23px;font-weight:700}.kpi .l{font-size:11px;color:var(--mut);margin-top:3px}
.grid{display:grid;grid-template-columns:1.55fr .95fr;gap:18px}
.card{background:var(--surf);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px}
.card .ch{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line)}
.card .ch h3{font-family:'Space Grotesk';font-size:14px;font-weight:600}.card .ch .r{margin-left:auto}
.row{display:grid;grid-template-columns:1fr 1.2fr auto 1.1fr;gap:10px;align-items:center;padding:11px 16px;border-bottom:1px solid #14202B;font-size:13px;cursor:pointer}
.row:last-child{border-bottom:none}.row:hover{background:#13202B}.row.head{color:#5E7284;font-size:10px;text-transform:uppercase;letter-spacing:.5px;background:#0C161F;cursor:default}.row.head:hover{background:#0C161F}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.tag.clear{background:rgba(63,207,142,.12);color:var(--green)}.tag.lien{background:rgba(240,86,58,.12);color:var(--red)}.tag.watch{background:rgba(37,208,200,.1);color:var(--aqua)}.tag.reg{background:rgba(127,176,255,.12);color:var(--sky)}
.alert{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid #14202B;cursor:pointer}.alert:last-child{border-bottom:none}.alert:hover{background:#13202B}
.alert.unread{background:rgba(245,179,1,.04)}
.alert .d{width:9px;height:9px;border-radius:50%;margin-top:4px;flex:none}
.d.lien{background:var(--red)}.d.rel{background:var(--green)}.d.own{background:var(--aqua)}.d.reg{background:var(--sky)}
.alert .tt{font-size:13px;font-weight:600}.alert .ts{font-size:11.5px;color:var(--mut);margin-top:1px}
.abil{background:linear-gradient(180deg,rgba(37,208,200,.06),transparent);border:1px solid rgba(37,208,200,.28);border-radius:14px;padding:16px 18px;margin-top:6px}
.abil h4{font-family:'JetBrains Mono';font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--aqua);margin-bottom:10px}
.abil ul{list-style:none;padding:0;margin:0;columns:2;column-gap:28px}
.abil li{font-size:13px;color:#C6D3DF;padding:4px 0;display:flex;gap:8px;break-inside:avoid}.abil li:before{content:"✓";color:var(--aqua)}
/* tail detail */
.rgrid{display:grid;grid-template-columns:1fr 1fr}.rgrid>div{padding:12px 16px;border-bottom:1px solid #14202B;border-right:1px solid #14202B}
.rgrid .k{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}.rgrid .v{font-family:'JetBrains Mono';font-size:13px;margin-top:3px}
.tli{display:flex;gap:13px;padding:13px 16px;border-bottom:1px solid #14202B}.tli:last-child{border-bottom:none}
.tli .dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex:none}
.tli .dd{font-family:'JetBrains Mono';font-size:12px;color:var(--mut);width:92px;flex:none}
.tli .tt{font-size:13.5px;font-weight:600}.tli .ts{font-size:12px;color:var(--mut);margin-top:1px}
.acts{display:flex;gap:9px;flex-wrap:wrap;padding:14px 16px;border-top:1px solid var(--line)}
/* forms / toggles */
.field{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--tx);font:inherit;font-size:14px;margin-top:6px}
.lbl{font-size:12px;color:var(--mut);font-weight:600;margin-top:14px;display:block}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.toggle{width:40px;height:23px;border-radius:999px;background:#22324F;position:relative;cursor:pointer;flex:none}.toggle.on{background:var(--aqua)}.toggle::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.15s}.toggle.on::after{left:19px}
.set{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #14202B}.set:last-child{border-bottom:none}
.set .sx{flex:1}.set b{font-size:13.5px}.set .sub{font-size:12px;color:var(--mut);margin-top:1px}
.subtabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:16px 0}
.subtabs a{padding:9px 13px;color:var(--mut);font-size:13.5px;border-bottom:2px solid transparent}.subtabs a.on{color:var(--aqua);border-bottom-color:var(--aqua)}
.pane{display:none}.pane.on{display:block}
/* plan cards */
.pcards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.pcard{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:18px}.pcard.cur{border-color:var(--aqua);box-shadow:0 0 0 1px rgba(37,208,200,.25)}
.pcard .nm{font-family:'Space Grotesk';font-weight:600}.pcard .amt{font-family:'Space Grotesk';font-size:26px;font-weight:700;margin:6px 0}
.pcard ul{list-style:none;padding:0;margin:10px 0 14px}.pcard li{font-size:12.5px;color:var(--mut);padding:3px 0;display:flex;gap:7px}.pcard li:before{content:"✓";color:var(--aqua)}
/* dropzone */
.drop{border:1.5px dashed #2A3A49;border-radius:12px;padding:34px;text-align:center;color:var(--mut);cursor:pointer;background:#0C1620}
.drop:hover{border-color:var(--aqua);color:var(--tx)}
/* seat / apirow */
.seat{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #14202B;font-size:13px}.seat:last-child{border-bottom:none}.seat .rl{margin-left:auto;font-size:11px;color:var(--mut)}
.bar{height:12px;border-radius:6px;background:#14202B;overflow:hidden;display:flex}.bar i{display:block;height:100%}
.codebox{font-family:'JetBrains Mono';font-size:12px;background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:12px 14px;color:#C6D3DF;white-space:pre-wrap;line-height:1.6;margin:0 16px 16px}
/* modal + toast */
.ov{position:fixed;inset:0;background:rgba(6,10,16,.6);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;padding:20px;z-index:40}.ov.on{display:flex}
.modal{background:var(--surf);border:1px solid var(--line);border-radius:16px;max-width:460px;width:100%;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.modal h3{font-family:'Space Grotesk';font-size:18px;margin-bottom:4px}.modal .ms{font-size:12.5px;color:var(--mut);margin-bottom:14px}
.mx{float:right;cursor:pointer;color:var(--mut);font-size:18px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#13202B;border:1px solid var(--aqua);color:var(--tx);padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.chip{font-size:12px;font-weight:600;color:var(--mut);background:var(--surf);border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer}.chip.on{background:var(--aqua);color:#04211E;border-color:var(--aqua)}
.note{font-size:11px;color:#5C6A78;text-align:center;padding:18px}
.umenu{position:fixed;top:56px;right:22px;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:6px;min-width:216px;box-shadow:0 16px 44px rgba(0,0,0,.55);display:none;z-index:60}
.umenu.on{display:block}
.umenu .uh{padding:9px 11px 11px;border-bottom:1px solid var(--line);margin-bottom:4px}
.umenu .uh b{font-size:13.5px}.umenu .uh .up{font-size:10.5px;color:var(--mut);font-family:'JetBrains Mono';margin-top:2px}
.umenu a{display:flex;gap:10px;align-items:center;padding:9px 11px;border-radius:8px;font-size:13.5px;color:var(--tx);cursor:pointer}
.umenu a:hover{background:#13202B}
.umenu .sep{height:1px;background:var(--line);margin:5px 4px}
.seg{display:inline-flex;background:#0C1620;border:1px solid var(--line);border-radius:9px;padding:3px;flex-wrap:wrap}
.seg button{border:none;background:none;cursor:pointer;font:inherit;font-size:12px;font-weight:600;color:var(--mut);padding:6px 12px;border-radius:7px}
.seg button.on{background:var(--aqua);color:#04211E}
.navsub{font-size:10.5px;color:var(--mut);margin-left:5px;font-weight:400}
.hsub{font-size:14px;color:var(--mut);font-weight:500;letter-spacing:0}
@media(max-width:900px){.shell{grid-template-columns:1fr}.rail{border-right:none;border-bottom:1px solid var(--line);padding:0 0 14px;display:flex;flex-wrap:wrap;gap:4px}.rail .grp,.plan{width:100%}.grid,.kpis,.pcards,.frow{grid-template-columns:1fr 1fr}.abil ul{columns:1}}
</style></head>
<body>
<div class="top"><div class="in">
<div class="brand" onclick="go('dash')"><span class="mk" id="mk"></span>Squawk<b>Trail</b></div>
<div class="roletabs" id="tabs">
<button data-r="owner" class="on">Owner</button><button data-r="broker">Broker</button><button data-r="lender">Lender</button>
</div>
<div class="search" onclick="lookupModal()">⌕ Search / look up a tail…</div>
<button class="btn p" onclick="addTailModal()">＋ Watch a tail</button>
<span class="bell" onclick="go('squawks')">🔔<span class="dot"></span></span>
<div class="av" onclick="toggleMenu(event)">JA</div>
</div></div>

<div class="umenu" id="umenu">
<div class="uh"><b>Jamin Austin</b><div class="up" id="umplan">Owner · $14/mo</div></div>
<a onclick="acct('profile')">👤 My account</a>
<a onclick="acct('notify')">🔔 Notifications &amp; alerts</a>
<a onclick="acct('billing')">💳 Plan &amp; billing</a>
<div class="sep"></div>
<a onclick="closeMenu();toast('Signed out')">⏻ Sign out</a>
</div>

<div class="shell"><aside class="rail" id="rail"></aside><main class="main" id="main"></main></div>
<div class="note">Interactive concept — every nav, row &amp; button is clickable (sample data). SquawkTrail · record-never-vouch.</div>

<div class="ov" id="ov" onclick="if(event.target.id==='ov')closeModal()"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

function scrTail(){
 const d=findTail(state.tail);if(!d)return `<div class="back" onclick="go('dash')">← back</div>Not found.`;
 const rows=d.trail.map(e=>`<div class="tli"><span class="dot d ${e[0]}" style="background:${e[0]==='lien'?'var(--red)':e[0]==='rel'?'var(--green)':e[0]==='own'?'var(--aqua)':'var(--sky)'}"></span><span class="dd">${e[1]}</span><div><div class="tt">${e[2]}</div><div class="ts">${e[3]||dotLabel[e[0]]}</div></div></div>`).join('');
 return `<div class="back" onclick="go('dash')">← back to ${ROLES[state.role].label.toLowerCase()}</div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><div class="h1 tl">${d.t}</div>${tag(d.s)}</div>
  <div class="crumb mono">${d.m} · ${d.o}</div>
  <div class="card" style="margin-top:16px"><div class="ch"><h3>Current FAA registration</h3></div>
   <div class="rgrid"><div><div class="k">Aircraft</div><div class="v">${d.m}</div></div><div><div class="k">Registered owner</div><div class="v" style="font-size:12px">${d.o}</div></div><div><div class="k">Registration</div><div class="v" style="font-size:12px">${d.reg}</div></div><div><div class="k">Coverage</div><div class="v" style="font-size:12px">daily snapshots</div></div></div>
   <div class="ch" style="border-top:1px solid var(--line)"><h3>The Trail — ownership &amp; lien history</h3></div>${rows}
   <div class="acts"><button class="btn p sm" onclick="toast('Re-ran FAA check for ${d.t}')">↻ Re-run check</button><button class="btn g sm" onclick="noteModal('${d.t}')">✎ Add note</button><button class="btn g sm" onclick="toast('Exported ${d.t} defense packet (PDF)')">⬇ Export</button><button class="btn a sm" onclick="toast('Notifications ${d.s==='watch'?'paused':'active'} for ${d.t}')">🔔 ${d.s==='watch'?'Watching':'Watching'}</button></div>
  </div>`;
}
function scrSquawks(){
 const f=state.filter;const items=SQUAWKS.filter(s=>f==='all'||s.c===f||(f==='status'&&s.c==='reg'));
 const chips=[['all','All'],['lien','Liens'],['own','Ownership'],['status','Status']].map(c=>`<span class="chip ${f===c[0]?'on':''}" onclick="state.filter='${c[0]}';render()">${c[1]}</span>`).join('');
 return `<div class="h1">Squawks <span class="hsub">· your alerts</span></div><div class="crumb">Every change on your watched tails — this is where alerts land.</div>
  <div style="display:flex;align-items:center;margin:16px 0"><div class="filters" style="margin:0">${chips}</div><button class="btn g sm" style="margin-left:auto" onclick="SQUAWKS.forEach(s=>s.read=true);toast('All marked read');render()">Mark all read</button></div>
  <div class="card">${items.length?feed(items):'<div style="padding:26px;text-align:center;color:var(--mut);font-size:13px">No squawks in this filter — all quiet. We&rsquo;ll ping you the moment that changes.</div>'}</div>`;
}
function scrTeam(){
 return `<div class="h1">Team &amp; seats</div><div class="crumb">${state.role==='lender'?'Enterprise seats':'4 of 8 seats used'}.</div>
  <div class="card" style="margin-top:16px"><div class="ch"><h3>Members</h3><button class="btn p sm r" onclick="inviteModal()">＋ Invite member</button></div>
   ${TEAM.map(m=>`<div class="seat"><b>${m[0]}</b> <span style="color:var(--mut);font-size:12px" class="mono">${m[1]}</span><span class="rl">${m[2]} ▾</span></div>`).join('')}</div>`;
}
function scrDigest(){
 return `<div class="h1">Daily digest</div><div class="crumb">A once-a-day roll-up of everything that moved — plus instant alerts on the big ones.</div>
  <div class="card" style="margin-top:16px">
   <div class="set"><div class="sx"><b>Daily digest email</b><div class="sub">One summary each morning.</div></div><div class="toggle on" onclick="this.classList.toggle('on');toast('Digest updated')"></div></div>
   <div class="set"><div class="sx"><b>Delivery time</b><div class="sub">When we send it.</div></div><select class="field" style="width:150px;margin:0"><option>7:00 AM CT</option><option>8:00 AM CT</option><option>6:00 PM CT</option></select></div>
   <div class="set"><div class="sx"><b>Instant alerts for liens</b><div class="sub">Don&rsquo;t wait for the digest on a new lien.</div></div><div class="toggle on" onclick="this.classList.toggle('on');toast('Updated')"></div></div>
  </div>
  <button class="btn g sm" onclick="toast('Sent a sample digest to your email')">Preview a digest</button>`;
}
function scrImport(){
 return `<div class="h1">Bulk import</div><div class="crumb">Upload a CSV of tail numbers to watch a whole fleet at once.</div>
  <div class="card" style="margin-top:16px;padding:16px"><div class="drop" onclick="importPreview()">⬆ &nbsp;Drop a CSV here or click to choose · <span class="mono" style="font-size:12px">tail,label</span></div></div>
  <div id="importResult"></div>`;
}
function importPreview(){
 document.getElementById('importResult').innerHTML=`<div class="card"><div class="ch"><h3>fleet_q3.csv — 5 tails parsed</h3><button class="btn p sm r" onclick="toast('Imported 5 tails to your watchlist');go('dash')">Import 5 tails</button></div>
  ${['N412TX','N88KL','N206WW','N19FE','N7710Q'].map(t=>`<div class="seat"><span class="tl" style="color:var(--aqua)">${t}</span><span style="color:var(--mut);font-size:12px;margin-left:auto">ready</span></div>`).join('')}</div>`;
 toast('Parsed fleet_q3.csv');
}
function scrApi(){
 return `<div class="h1">API keys</div><div class="crumb">Wire monitoring into your own systems.</div>
  <div class="card" style="margin-top:16px"><div class="ch"><h3>Keys</h3><button class="btn p sm r" onclick="toast('Generated a new API key')">＋ Create key</button></div>
   <div class="apirow" style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #14202B"><span class="mono" style="color:var(--mut);font-size:12px">Production</span><span class="mono" id="apikey" style="color:#C6D3DF">sk_live_••••_a91f</span><a style="margin-left:auto;color:var(--aqua);font-size:12px" onclick="document.getElementById('apikey').textContent='sk_live_••••_'+Math.random().toString(16).slice(2,6);toast('Key rotated')">Rotate</a></div></div>
  <div class="card"><div class="ch"><h3>Quick start</h3></div><div class="codebox">curl https://api.squawktrail.com/v1/tails/N321JT \\
  -H "Authorization: Bearer sk_live_..."

# → { tail, status, owner, trail:[…], watching:true }</div></div>`;
}
let freq='instant';
function setFreq(f){freq=f;render();toast('Alert frequency: '+f);}
function scrAccount(){
 const sub=state.sub;
 const tabs=[['profile','Profile'],['security','Security'],['notify','Notifications &amp; alerts'],['billing','Plan &amp; billing']].map(t=>`<a class="${sub===t[0]?'on':''}" onclick="state.sub='${t[0].replace(/&amp;/g,'&')}';render()">${t[1]}</a>`).join('');
 let pane='';
 if(sub==='profile')pane=`<div class="card" style="padding:6px 16px 16px"><label class="lbl">Full name</label><input class="field" value="Jamin Austin"><div class="frow"><div><label class="lbl">Email</label><input class="field" value="jamin@acme.com"></div><div><label class="lbl">Phone (for SMS squawks)</label><input class="field" value="+1 512 ••• 4021"></div></div><button class="btn p sm" style="margin-top:16px" onclick="toast('Profile saved')">Save changes</button></div>`;
 if(sub==='security')pane=`<div class="card"><div class="set"><div class="sx"><b>Two-factor authentication</b><div class="sub">App-based 2FA.</div></div><div class="toggle on" onclick="this.classList.toggle('on');toast('2FA updated')"></div></div><div class="set"><div class="sx"><b>Password</b><div class="sub">Last changed 3 months ago.</div></div><button class="btn g sm" onclick="toast('Password reset link sent')">Change</button></div><div class="set"><div class="sx"><b>Recovery codes</b><div class="sub">Saved offline.</div></div><button class="btn g sm" onclick="toast('Generated new recovery codes')">Regenerate</button></div></div>`;
 if(sub==='notify'){
  const seg=[['instant','Instant · real-time'],['hourly','Hourly digest'],['daily','Daily digest'],['weekly','Weekly summary']].map(o=>`<button class="${freq===o[0]?'on':''}" onclick="setFreq('${o[0]}')">${o[1]}</button>`).join('');
  pane=`
   <div class="card"><div class="ch"><h3>How often do you want squawks?</h3></div>
    <div style="padding:14px 16px"><div class="seg">${seg}</div>
     <div class="sub" style="font-size:12px;color:var(--mut);margin-top:10px">${freq==='instant'?'Get pinged the moment a change hits — best for active deals &amp; closings.':freq==='hourly'?'One roundup per hour of anything that moved.':freq==='daily'?'A single morning summary of the day&rsquo;s changes.':'A Monday recap of the week.'} <b style="color:var(--amber)">Liens always send instantly</b> regardless of this setting.</div></div>
    <div class="set"><div class="sx"><b>Override: always instant for liens</b><div class="sub">New lien = immediate, no matter the frequency above.</div></div><div class="toggle on" onclick="this.classList.toggle('on');toast('Updated')"></div></div>
    <div class="set"><div class="sx"><b>Quiet hours</b><div class="sub">Hold non-urgent squawks overnight.</div></div><select class="field" style="width:170px;margin:0"><option>Off</option><option selected>10 PM – 7 AM</option><option>9 PM – 8 AM</option></select></div>
   </div>
   <div class="card"><div class="ch"><h3>Channels</h3></div>
    <div class="set"><div class="sx"><b>📧 Email squawks</b><div class="sub">jamin@acme.com</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    <div class="set"><div class="sx"><b>📱 SMS squawks</b><div class="sub">+1 512 ••• 4021</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
   </div>
   <div class="card"><div class="ch"><h3>Only alert me for…</h3></div>
    <div class="set"><div class="sx"><b>New liens</b></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    <div class="set"><div class="sx"><b>Ownership transfers</b></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    <div class="set"><div class="sx"><b>Registration status changes</b></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    <div class="set"><div class="sx"><b>Expiring soon (within 60 days)</b></div><div class="toggle" onclick="this.classList.toggle('on')"></div></div>
   </div>
   <button class="btn p sm" onclick="toast('Notification preferences saved')">Save preferences</button>`;
 }
 if(sub==='billing')pane=billingBody();
 return `<div class="h1">My account</div><div class="crumb">${ROLES[state.role].plan}</div><div class="subtabs">${tabs}</div>${pane}`;
}
function billingBody(){
 const cur=state.role;
 const plans=[['owner','Owner','$14',['Up to 2 tails','Email + SMS','Full Trail']],['broker','Broker','$79',['Up to 25 tails','Team + roles','Digest']],['lender','Lender','$199+',['Unlimited','Portfolio + API','SLAs']]];
 const cards=plans.map(p=>`<div class="pcard ${cur===p[0]?'cur':''}"><div class="nm">${p[1]}</div><div class="amt">${p[2]}<span style="font-size:12px;color:var(--mut)">/mo</span></div><ul>${p[3].map(x=>`<li>${x}</li>`).join('')}</ul>${cur===p[0]?'<div class="tag watch">CURRENT</div>':`<button class="btn g sm" style="width:100%" onclick="toast('Switched to ${p[1]} plan')">Switch</button>`}</div>`).join('');
 return `<div class="pcards" style="margin-top:2px">${cards}</div>
  <div class="card" style="margin-top:18px"><div class="ch"><h3>Payment method</h3><button class="btn g sm r" onclick="toast('Update card (Stripe)')">Update</button></div><div class="seat">Visa ending 6411 <span style="color:var(--mut);font-size:12px;margin-left:auto">exp 09/28</span></div></div>
  <div class="card"><div class="ch"><h3>Invoices</h3></div>${INVOICES.map(i=>`<div class="seat"><span class="mono" style="font-size:12px">${i[0]}</span><span style="margin-left:auto;margin-right:16px" class="mono">${i[1]}</span><span class="tag clear">${i[2]}</span><a style="color:var(--aqua);font-size:12px;margin-left:12px" onclick="toast('Downloaded invoice ${i[0]}')">PDF</a></div>`).join('')}</div>`;
}
// profile dropdown
function toggleMenu(e){e.stopPropagation();document.getElementById('umenu').classList.toggle('on');}
function closeMenu(){document.getElementById('umenu').classList.remove('on');}
function acct(sub){state.sub=sub;state.screen='account';closeMenu();render();}
document.addEventListener('click',()=>closeMenu());

// ---------- modals ----------
const CAPS={owner:2,broker:25,lender:Infinity};
function atCap(){return (ROLES[state.role].count+state.added.length)>=CAPS[state.role];}
function upgradeModal(){const nx={owner:['Broker','up to 25 tails','$79/mo'],broker:['Lender / Enterprise','unlimited tails','$199+/mo'],lender:['Enterprise','custom limits','contact us']}[state.role];const lim=state.role==='owner'?'2 tails':state.role==='broker'?'25 tails':'unlimited tails';modal(`<span class="mx" onclick="closeModal()">✕</span><h3>You&rsquo;ve reached your tail limit</h3><div class="ms">Your current plan covers ${lim}. Upgrade to watch more.</div><div class="pcard cur" style="margin-bottom:12px"><div class="nm">${nx[0]}</div><div class="amt">${nx[2]}</div><ul><li>${nx[1]}</li></ul></div><button class="btn p" style="width:100%" onclick="closeModal();toast('Upgraded to ${nx[0]}')">Upgrade to ${nx[0]}</button>`);}
function addTailModal(){if(atCap()){upgradeModal();return;}modal(`<span class="mx" onclick="closeModal()">✕</span><h3>Watch a tail</h3><div class="ms">Enter an N-number to put it under daily watch.</div><input class="field mono" id="ntl" placeholder="N321JT" style="letter-spacing:1px"><button class="btn p" style="width:100%;margin-top:14px" onclick="doAdd()">Squawk this tail</button>`);}
function doAdd(){let n=(document.getElementById('ntl').value||'').toUpperCase().replace(/[^A-Z0-9]/g,'')||'N000ST';state.added.unshift({t:n,m:'Pending first pull',o:'—',reg:'—',s:'watch',trail:[['reg',new Date().toISOString().slice(0,10),'Watching started','Daily FAA watch on']]});closeModal();toast('Now watching '+n);go('dash');}
function lookupModal(){modal(`<span class="mx" onclick="closeModal()">✕</span><h3>Look up a tail</h3><div class="ms">Free — see current FAA status + a Trail teaser.</div><input class="field mono" id="lkt" placeholder="N321JT" style="letter-spacing:1px"><button class="btn p" style="width:100%;margin-top:14px" onclick="doLookup()">Look up</button>`);}
function doLookup(){let n=(document.getElementById('lkt').value||'').toUpperCase().replace(/[^A-Z0-9]/g,'');closeModal();if(findTail(n)){openTail(n);}else{openTail('N321JT');}toast('Lookup: '+(n||'N321JT'));}
function inviteModal(){modal(`<span class="mx" onclick="closeModal()">✕</span><h3>Invite a teammate</h3><div class="ms">They&rsquo;ll get access to the shared watchlist.</div><input class="field" placeholder="teammate@company.com"><label class="lbl">Role</label><select class="field"><option>Broker</option><option>Viewer</option><option>Admin</option></select><button class="btn p" style="width:100%;margin-top:14px" onclick="closeModal();toast('Invitation sent')">Send invite</button>`);}
function noteModal(t){modal(`<span class="mx" onclick="closeModal()">✕</span><h3>Add a note · ${t}</h3><div class="ms">Private to your team.</div><textarea class="field" rows="3" placeholder="e.g. Buyer aware of lien; closing 07-15."></textarea><button class="btn p" style="width:100%;margin-top:14px" onclick="closeModal();toast('Note added to ${t}')">Save note</button>`);}

// ---------- render ----------
function render(){
 const r=ROLES[state.role];
 document.getElementById('rail').innerHTML=`<div class="plan">${r.short}</div><div class="grp">Workspace</div>`+
  r.nav.map(n=>`<a class="${state.screen===n[0]?'on':''}" onclick="go('${n[0]}')"><span class="ic">${n[1]}</span>${n[2]}${n[3]?`<span class="navsub">(${n[3]})</span>`:''}</a>`).join('');
 let html='';
 switch(state.screen){
  case 'tail':html=scrTail();break;
  case 'squawks':html=scrSquawks();break;
  case 'team':html=scrTeam();break;
  case 'digest':html=scrDigest();break;
  case 'import':html=scrImport();break;
  case 'api':html=scrApi();break;
  case 'account':html=scrAccount();break;
  case 'tails':html=`<div class="h1">Financed tails</div><div class="crumb">1,240 tails · showing 8</div><div class="card" style="margin-top:16px">${listRows(8)}</div>`;break;
  default:html=scrDash(r);
 }
 document.getElementById('main').innerHTML=html;
 document.getElementById('umplan').textContent=r.plan.split(' · ').slice(0,2).join(' · ');
 document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.r===state.role));
}
document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>setRole(b.dataset.r));
render();
</script>
</body></html>
