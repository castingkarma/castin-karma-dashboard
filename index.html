<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Tracker — Casting Karma</title>
<link rel="icon" href="https://castingkarmallc.com/emblem.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FBF8F1; --ink:#2E3A28; --ink2:#6E7A63; --line:#E6E0D2; --card:#FFFFFF;
--blue:#A8863F; --green:#3B6D34; --amber:#B07A1E; --slate:#8A7B5E; --violet:#7A6A45;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit}
header{background:#FFFFFF;color:var(--ink);border-bottom:1px solid var(--line);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;display:flex;align-items:center;justify-content:center}.logo img{height:40px;width:auto;display:block}
.brand h1{font-family:'Cinzel',Georgia,serif;font-size:16px;margin:0;font-weight:600;letter-spacing:1px;color:var(--ink)}
.brand .sub{font-size:12px;color:var(--ink2);margin-top:1px}
.htag{font-size:10px;font-weight:700;letter-spacing:.5px;background:rgba(194,162,82,.15);padding:3px 8px;border-radius:6px;color:#A8863F}
.updated{font-size:11px;color:var(--ink2)}
.wrap{max-width:1100px;margin:0 auto;padding:22px}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.tile .k{font-size:11px;color:var(--ink2);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.tile .v{font-size:26px;font-weight:800;margin-top:6px}
.tile .v small{font-size:13px;font-weight:600;color:var(--ink2)}
.tabs{display:flex;gap:8px;margin:4px 0 16px;border-bottom:1px solid var(--line)}
.tab{appearance:none;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink2);padding:10px 4px;margin-right:14px;border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:7px}
.tab .cnt{font-size:11px;font-weight:800;background:#eef1f5;color:var(--ink2);border-radius:999px;padding:1px 8px}
.tab.active{color:var(--ink);border-bottom-color:var(--blue)}
.tab.active .cnt{background:#e6efff;color:var(--blue)}
.tabhint{font-size:12px;color:var(--ink2);margin:-6px 0 14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:.15s;position:relative}
.card:hover{box-shadow:0 8px 24px rgba(15,23,42,.08);transform:translateY(-2px);border-color:#d7dce4}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.chead{display:flex;gap:11px;align-items:flex-start;flex:1;min-width:0}
.cicon{width:40px;height:40px;flex:0 0 40px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.cicon svg{display:block;width:40px;height:40px}
.cinitial{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px}
.cname{font-size:15px;font-weight:700;line-height:1.25}
.rankbadge{display:inline-flex;align-items:center;justify-content:center;min-width:21px;height:20px;padding:0 6px;border-radius:6px;background:#eef2ff;color:#3b5bdb;font-size:11px;font-weight:800;margin-right:7px;vertical-align:2px}
.platform{font-size:11px;color:var(--ink2);margin-top:3px;display:flex;align-items:center;gap:6px}
.wsite{display:inline-block;margin-top:6px;font-size:11.5px;color:var(--blue);text-decoration:none;font-weight:700}
.wsite:hover{text-decoration:underline}
.dot{width:6px;height:6px;border-radius:50%;background:var(--blue);display:inline-block}
.pill{font-size:10px;font-weight:700;letter-spacing:.3px;padding:4px 9px;border-radius:999px;white-space:nowrap}
.pill.build{background:#fff7ed;color:var(--amber)}
.pill.live{background:#ecfdf3;color:var(--green)}
.pill.greenlit{background:#e8f7ee;color:#0f8a3d;border:1px solid #bfe8cf}
.pill.review{background:#eef2ff;color:#3b5bdb;border:1px solid #c7d2fe}
.pill.possible{background:#f5f0ff;color:#6d28d9;border:1px solid #ddd0fb}
.pill.planned{background:#f1f5f9;color:var(--slate)}
.pill.archived{background:#f1eee7;color:#8a7b5e;border:1px solid #e0d8c8}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.kpi{background:#fafbfc;border:1px solid var(--line);border-radius:9px;padding:9px}
.kpi.pot{background:#f3f0ff;border-color:#e2d9fb}
.kpi .kk{font-size:10px;color:var(--ink2);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi.pot .kk{color:#6d28d9}
.kpi .kv{font-size:15px;font-weight:800;margin-top:3px}
.kpi.pot .kv{color:#6d28d9}
.cnote{font-size:11.5px;color:var(--ink2);margin-top:12px;display:flex;align-items:center;gap:6px}
.cnote .src{margin-left:auto;font-size:10px;background:#f1f5f9;color:var(--slate);padding:2px 7px;border-radius:5px}
.ov{position:fixed;inset:0;background:rgba(8,15,30,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:30}
.ov.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:560px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:88vh;overflow:auto}
.modal h3{margin:0;font-size:18px}
.modal .mp{font-size:12px;color:var(--ink2);margin-top:3px}
.mclose{float:right;border:none;background:#f1f5f9;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--ink2)}
.mkpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.mkpi{background:#f0f6ff;border:1px solid #d8e6ff;border-radius:10px;padding:11px}
.mkpi.pot{background:#f3f0ff;border-color:#e2d9fb}
.mkpi .kk{font-size:10px;color:#3b5bdb;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.mkpi.pot .kk{color:#6d28d9}
.mkpi .kv{font-size:17px;font-weight:800;margin-top:3px;color:#1e3a8a}
.mkpi.pot .kv{color:#6d28d9}
.seclbl{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#3b5bdb;margin:18px 0 7px}
.ftab{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:2px}
.ftab th{text-align:left;color:#5b6676;font-weight:700;border-bottom:1px solid #e6e9ef;padding:5px 6px;white-space:nowrap}
.ftab td{padding:5px 6px;border-bottom:1px solid #f1f5f9;color:#0e1726}
.tierbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.tierpill{font-size:11px;font-weight:700;background:#f0f6ff;border:1px solid #d8e6ff;color:#1e3a8a;border-radius:8px;padding:5px 9px}
.mrow{display:flex;justify-content:space-between;gap:18px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.mrow span:first-child{color:var(--ink2);white-space:nowrap;flex:0 0 34%}
.mrow span:last-child{font-weight:600;text-align:right}
.mlink{display:inline-block;margin:12px 8px 0 0;padding:8px 12px;border:1px solid #d8e6ff;background:#f0f6ff;border-radius:9px;color:#1e3a8a;font-weight:700;font-size:12.5px;text-decoration:none}
.mlink:hover{background:#e2eeff}
.linkchip{color:var(--blue);font-weight:700}
footer{max-width:1100px;margin:0 auto;padding:8px 22px 30px;color:var(--ink2);font-size:11.5px}
@media(max-width:760px){.tiles{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

// ── RENDER ────────────────────────────────────────────────────────────
const money = n => "$"+n.toLocaleString();
let TAB = "build";
function iconHtml(p){
if(p.icon) return p.icon;
const colors={build:"#d97706",review:"#3b5bdb",live:"#16a34a",greenlit:"#0f8a3d",possible:"#6d28d9",planned:"#64748b",archived:"#8a7b5e"};
const c = colors[p.status] || "#64748b";
const ch = (p.name||"?").replace(/[^A-Za-z0-9]/,"").charAt(0).toUpperCase();
return `<div class="cinitial" style="background:${c}">${ch}</div>`;
}
const STATUS = {build:["build","In build"], review:["review","In review"], live:["live","Live"], greenlit:["greenlit","Green-lit"], possible:["possible","Possible"], planned:["planned","Planned"], archived:["archived","Cut"]};

function renderTiles(){
const inReview = PROJECTS.filter(p=>p.status==="review").length;
const inBuild = PROJECTS.filter(p=>p.status==="build").length;
const greenlit = PROJECTS.filter(p=>p.status==="greenlit").length;
const _h=hiddenSet(); const possible = PROJECTS.filter(p=>p.group==="possible"&&!_h.has(p.id)).length;
const tiles = [
{k:"In review", v:inReview},
{k:"In build", v:inBuild},
{k:"Green-lit", v:greenlit},
{k:"Possible projects", v:possible}
];
document.getElementById("tiles").innerHTML = tiles.map(t=>
`<div class="tile"><div class="k">${t.k}</div><div class="v">${t.v}</div></div>`).join("");
}

const isBuildPhase = p => p.group==="active" && (p.status==="build"||p.status==="greenlit"||p.status==="planned");
const isReviewPhase = p => p.group==="active" && p.status==="review";
const isLivePhase = p => p.group==="active" && p.status==="live";
function renderTabs(){
const nBuild = PROJECTS.filter(isBuildPhase).length;
const nReview = PROJECTS.filter(isReviewPhase).length;
const nLive = PROJECTS.filter(isLivePhase).length;
const _h2=hiddenSet(); const nPoss = PROJECTS.filter(p=>p.group==="possible"&&!_h2.has(p.id)).length;
const nArch = PROJECTS.filter(p=>p.group==="archive").length;
document.getElementById("tabs").innerHTML =
`<button class="tab ${TAB==='live'?'active':''}" onclick="setTab('live')">Live <span class="cnt">${nLive}</span></button>
<button class="tab ${TAB==='review'?'active':''}" onclick="setTab('review')">In Review <span class="cnt">${nReview}</span></button>
<button class="tab ${TAB==='build'?'active':''}" onclick="setTab('build')">In Build <span class="cnt">${nBuild}</span></button>
<button class="tab ${TAB==='possible'?'active':''}" onclick="setTab('possible')">Possible Projects <span class="cnt">${nPoss}</span></button>
<button class="tab ${TAB==='archive'?'active':''}" onclick="setTab('archive')">Archive <span class="cnt">${nArch}</span></button>
<button class="tab ${TAB==='structure'?'active':''}" onclick="setTab('structure')">Structure</button>`;
document.getElementById("tabhint").innerHTML = TAB==="build"
? "Projects actively being built (incl. green-lit, not yet submitted). Tap a card for full details."
: TAB==="review"
? "Finished &amp; submitted — in marketplace review, awaiting approval. Tap a card for full details."
: TAB==="live"
? "Live to customers. TenderProof (tenderproof.io) launched 06-30 in demo mode; paid billing wiring + pilots next."
: TAB==="possible"
? "Researched &amp; scored, not committed — <b>ordered by what I'd build next</b> (#1 = my top pick). Tap a card for solution, market, pricing, integrations &amp; the build split."
: TAB==="archive"
? "Projects CUT under our gates (moat / score) — kept for the audit trail. Tap a card for why it was cut."
: "How the lanes coordinate — one Project, many chats, shared living docs. Mirrors <code>00_Operations/Coordination_System_Map.svg</code>.";
}
function setTab(t){ TAB=t; renderTabs(); renderGrid(); }

function card(p){
const [cls,label] = STATUS[p.status];
const kpis = (p.kpis||[]).map(x=>`<div class="kpi${x.pot?' pot':''}"><div class="kk">${x.k}</div><div class="kv">${x.v}</div></div>`).join("");
const rb = p.rank ? `<span class="rankbadge">#${p.rank}</span>` : "";
return `<div class="card" onclick='openModal("${p.id}")'>
<div class="ctop">
<div class="chead">
<div class="cicon">${iconHtml(p)}</div>
<div><div class="cname">${rb}${p.name}</div>
<div class="platform"><span class="dot"></span>${p.platform}</div>
${p.website?`<a class="wsite" href="${p.website}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">🌐 ${p.website.replace(/^https?:\/\//,'')} ↗</a>`:""}</div>
</div>
<span class="pill ${cls}">${label}</span>
</div>
<div class="kpis">${kpis}</div>
<div class="cnote">${p.note}<span class="src">${p.source}</span></div>
</div>`;
}

function renderGrid(){
const grid = document.getElementById("grid");
const struct = document.getElementById("structure");
if(TAB==="structure"){ struct.style.display="block"; grid.style.display="none"; return; }
struct.style.display="none"; grid.style.display="";
let items;
if(TAB==="build"){ items = PROJECTS.filter(isBuildPhase); }
else if(TAB==="review"){ items = PROJECTS.filter(isReviewPhase); }
else if(TAB==="live"){ items = PROJECTS.filter(isLivePhase); }
else if(TAB==="archive"){ items = PROJECTS.filter(p=>p.group==="archive"); }
else { const h=hiddenSet(); items = PROJECTS.filter(p=>p.group==="possible"&&!h.has(p.id)); items.sort((a,b)=>(a.rank||99)-(b.rank||99)); }
grid.innerHTML = items.length ? items.map(card).join("") : `<div style="grid-column:1/-1;color:var(--ink2);font-size:13px;padding:10px 2px">${TAB==='live'?'No products are live yet — first launch coming soon. Apps move here from In Review once they launch to customers.':'Nothing here yet.'}</div>`;
if(TAB==="possible"){ const n=hiddenSet().size; if(n>0) grid.innerHTML = `<div style="grid-column:1/-1;font-size:12px;color:var(--ink2);margin:-4px 0 4px">${n} hidden from your view · <a href="#" onclick="unhideAll();return false" style="color:var(--blue);font-weight:700">show all</a></div>` + grid.innerHTML; }
}

function hiddenSet(){try{return new Set(JSON.parse(localStorage.getItem("ck_hidden")||"[]"))}catch(e){return new Set()}}
function saveHidden(x){localStorage.setItem("ck_hidden",JSON.stringify([...x]))}
function hideProject(id){const x=hiddenSet();x.add(id);saveHidden(x);closeModal();renderTiles();renderTabs();renderGrid();}
function unhideAll(){localStorage.removeItem("ck_hidden");renderTiles();renderTabs();renderGrid();}
function barColor(v){return v>=4?"#3B6D34":v>=3?"#B07A1E":"#b23b3b";}
function scHtml(s){
var sc=s.score.map(function(r){return '<div style="display:flex;align-items:center;gap:10px;margin:7px 0"><span style="font-size:12.5px;width:160px;color:var(--ink)">'+r[0]+'</span><div style="flex:1;height:8px;background:#efeadd;border-radius:4px;overflow:hidden"><div style="width:'+(r[1]*20)+'%;height:100%;background:'+barColor(r[1])+'"></div></div><span style="font-size:12.5px;font-weight:800;width:18px;text-align:right">'+r[1]+'</span></div>';}).join("");
var bk=s.barrier.toLowerCase().indexOf("low")===0?"#e8f7ee":s.barrier.toLowerCase().indexOf("med")===0?"#fff7ed":"#fdecec";
var bc=s.barrier.toLowerCase().indexOf("low")===0?"#0f8a3d":s.barrier.toLowerCase().indexOf("med")===0?"#B07A1E":"#b23b3b";
function L(lab,val,col){return '<div style="font-size:12.5px;margin:5px 0;line-height:1.5"><span style="color:'+(col||"var(--ink2)")+';font-weight:700">'+lab+'</span> '+val+'</div>';}
return ''
+'<div class="seclbl">In plain words</div>'
+L("What is it?",s.plain.what)+L("What problem?",s.plain.problem)+L("Who pays?",s.plain.who)
+'<div class="seclbl">Snapshot</div>'
+'<div class="mrow"><span>Industry</span><span>'+s.cls.industry+'</span></div>'
+'<div class="mrow"><span>Customer</span><span>'+s.cls.customer+'</span></div>'
